<!-- asg0.html -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Draw a blue rectangle (canvas version)</title>
  </head>

  <body onload="main()">
    <canvas id="example" width="400" height="400">
    Please use a browser that supports "canvas"
    </canvas>
    <br>
    <label>V1 X:</label> <input type="number" id="xCoord" value="2.25">
    <label>V1 Y:</label> <input type="number" id="yCoord" value="2.25">
    <br>
    <label>V2 X:</label> <input type="number" id="xCoord2" value="1.0">
    <label>V2 Y:</label> <input type="number" id="yCoord2" value="1.0">
    <br>
    <input type="button" value="Draw" onclick="handleDrawEvent()">
    <br><br>
    <label>Operation:</label>
    <select id="operation">
      <option value="add">Add</option>
      <option value="sub">Subtract</option>
      <option value="mul">Multiply</option>
      <option value="div">Divide</option>

      <option value="magnitude">Magnitude</option>
      <option value="normalize">Normalize</option>

      <option value="angle">Angle between</option>

      <!-- <option value="angle">Angle between</option> -->
       
      <option value="area">Area</option>
    </select>
    <label>Scalar:</label> <input type="number" id="scalar" value="2.0">
    <input type="button" value="Draw Operation" onclick="handleDrawOperationEvent()">
    <script src="lib/cuon-matrix-cse160.js"></script>
    <script src="asg0.js"></script>
  </body>
</html>
